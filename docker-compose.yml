version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_pass
      POSTGRES_DB: local_delivery
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_user -d local_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: dev
      APP_NAME: local-delivery
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql+asyncpg://delivery_user:delivery_pass@postgres:5432/local_delivery
      READ_DATABASE_URL: postgresql+asyncpg://delivery_user:delivery_pass@postgres:5432/local_delivery
      REDIS_URL: redis://redis:6379/0
      REDIS_AVAILABILITY_TTL: "60"
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
